<div class="list-group-item d-flex justify-content-between align-items-center" [class.bg-light]="task.completed">
    <div class="form-check">
      <input 
        class="form-check-input" 
        type="checkbox" 
        [checked]="task.completed" 
        (change)="toggle.emit()"
        id="task-{{ task.id }}">
      <label class="form-check-label" [class.text-decoration-line-through]="task.completed" for="task-{{ task.id }}">
        {{ task.title }}
      </label>
    </div>
    <button (click)="delete.emit()" class="btn btn-outline-danger btn-sm">🗑️</button>
  </div>
